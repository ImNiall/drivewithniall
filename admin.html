<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin login | Drive with Niall</title>
    <link rel="stylesheet" href="styles.css?v=ui-polish-1" />
  </head>
  <body>
    <main class="admin-login-page">
      <section class="admin-login-card">
        <a class="brand" href="index.html" aria-label="Drive with Niall home">
          <span class="brand-wordmark" aria-hidden="true">
            <span class="brand-drive">Drive</span>
            <span class="brand-with">with</span>
            <span class="brand-niall">Niall<span class="brand-bang">!</span></span>
          </span>
          <span class="brand-copy">
            <strong>Drive with Niall</strong>
            <small id="adminBrandName">Admin</small>
          </span>
        </a>

        <div id="adminSignedOut">
          <p class="eyebrow">Admin login</p>
          <h1>Sign in to manage Drive with Niall</h1>
          <p>Use an approved admin account to access private site tools.</p>

          <div class="account-status" id="adminStatus" role="status"></div>

          <form class="auth-form is-active" id="adminLoginForm">
            <label>Username <input name="username" type="text" placeholder="ImNiall's Project" autocomplete="username" required /></label>
            <label>Password <input name="password" type="password" placeholder="Your password" autocomplete="current-password" required /></label>
            <button class="primary-button full" type="submit">Sign in</button>
          </form>
        </div>

        <div class="admin-panel" id="adminPanel" hidden>
          <p class="eyebrow">Admin area</p>
          <h1 id="adminDashboardTitle">Admin dashboard</h1>
          <p>Signed in as <strong id="adminEmail">admin</strong>.</p>

          <div class="admin-actions">
            <a class="secondary-action" href="https://outlook.office.com/mail/" target="_blank" rel="noreferrer">Open email inbox</a>
            <a class="secondary-action" href="https://supabase.com/dashboard/project/antykaonrraerlmwpmqp/auth/users" target="_blank" rel="noreferrer">Manage student accounts</a>
            <a class="secondary-action" href="https://vercel.com/dashboard" target="_blank" rel="noreferrer">Open Vercel</a>
          </div>

          <button class="outline-button" id="adminSignOutButton" type="button">Sign out</button>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
